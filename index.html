<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade plan</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="upgrade_parent">
        <div class="upgrade">
            <div class="upgrade_head">
                <h1>Upgrade your plan</h1>
            </div>
            <div class="upgrade_info">
                <div class="free">
                    <div>
                        <h3>Free</h3>
                    </div>
                    <div class="price">
                        <h2>$0</h2>
                        <p>usd / month</p>
                    </div>
                    <div class="pice_des">
                        <p>See what AI can do</p>
                    </div>
                    <div>
                        <button>Your current plan</button>
                    </div>
                    <div class="price_about">
                        <p>Core model</p>
                        <p>Limited messages and uploads</p>
                        <p>Limited image creation</p>
                        <p>Limited memory</p>
                    </div>
                    <div class="footer_info">
                        <p>Have an existing plan? <a href="#">See billing help</a></p>
                    </div>
                </div>
                <div class="go">
                    <div>
                        <h3>Go</h3>
                    </div>
                    <div>
                        <h2>$5</h2>
                        <p>usd / month</p>
                    </div>
                    <div>
                        
                    </div>
                </div>
                <div class="plus">
                    <div>
                        <h3>Plus</h3>
                    </div>
                    <div>
                        <h2>$20</h2>
                        <p>usd / month</p>
                    </div>
                    <div>
                        
                    </div>
                </div>
                <div class="pro">
                    <div>
                        <h3>Pro</h3>
                    </div>
                    <div>
                        <h2>$115</h2>
                        <p>usd / month</p>
                    </div>
                    <div>
                        
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
